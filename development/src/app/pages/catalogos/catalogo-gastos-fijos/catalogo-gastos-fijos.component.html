<div class="card shadow-sm">
	<p-table
		#ptGastosFijos
		responsive="true"
		[value]="GastosFijos"
		[columns]="GastosFijosCols"
		[rowHover]="true"
		[globalFilterFields]="GastosFijosFilter"
		[showCurrentPageReport]="true"
		[paginator]="GastosFijos.length > 0"
		[rows]="50"
		currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} registros"
		[responsive]="true"
		styleClass="p-datatable-striped"
	>
		<ng-template pTemplate="caption">
			<div class="d-flex align-items-center p-1">
				<div class="me-auto">
					<!-- Botón Nuevo -->
					<button
						pButton
						type="button"
						icon="pi pi-plus"
						class="p-button-rounded p-button-raised p-button-success ms-1"
						pTooltip="Agregar gasto fijo"
						tooltipPosition="right"
						(click)="onGastoFijoEditar()"
					></button>
				</div>
				<!-- Opciones Filtrado -->
				<div class="ms-auto">
					<!-- Botón Actualizar -->
					<button
						*ngIf="isDevelopment"
						pButton
						type="button"
						icon="pi pi-refresh"
						class="p-button-rounded p-button-text p-button-secondary me-2"
						pTooltip="Actualizar información"
						tooltipPosition="right"
						(click)="onActualizarInformacion()"
					></button>
					<span class="p-input-icon-left">
						<i class="pi pi-search"></i>
						<input
							type="text"
							id="txtGlobalFilter"
							class="form-control ms-1 ps-4"
							(input)="ptGastosFijos.filterGlobal($event.target.value, 'contains')"
							placeholder="Filtrar"
						/>
					</span>
				</div>
				<div>
					<button
						pButton
						pRipple
						type="button"
						id="btnLimpiarFiltro"
						icon="pi pi-times"
						class="p-button-rounded p-button-text p-button-danger ms-3"
						pTooltip="Limpiar filtro"
						tooltipPosition="left"
						(click)="hlpPrimeNGTable.reset(ptGastosFijos)"
					></button>
				</div>
			</div>
		</ng-template>
		<ng-template pTemplate="header" let-columns>
			<tr>
				<th
					*ngFor="let col of columns"
					class="text-center"
					[ngStyle]="{
						width: col.width ? col.width : 'inherit'
					}"
				>
					{{ col.header ? col.header : '&nbsp;' }}
				</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-GastoFijo>
			<tr>
				<td><span class="p-column-title">Gasto fijo</span>{{ GastoFijo.gasto_fijo }}</td>
				<td class="text-md-center">
					<span class="p-column-title">Estatus</span>
					<span style="cursor: pointer">
						<p-tag
							severity="{{ GastoFijo.estatus == 1 ? 'success' : 'danger' }}"
							value="{{ GastoFijo.estatus == 1 ? 'A' : 'Ina' }}ctivo"
							pTooltip="{{ GastoFijo.estatus == 1 ? 'Desh' : 'H' }}abilitar gasto fijo"
							tooltipPosition="left"
							(click)="onGastoFijoAlternarEstatus(GastoFijo)"
						></p-tag>
					</span>
				</td>
				<td class="text-end">
					<!-- Botón Editar -->
					<button
						pButton
						*ngIf="GastoFijo.estatus == 1"
						type="button"
						icon="pi pi-pencil"
						class="p-button-rounded p-button-text p-button-success me-1"
						pTooltip="Editar gasto fijo"
						tooltipPosition="left"
						(click)="onGastoFijoEditar(GastoFijo.id_gasto_fijo)"
					></button>
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="emptymessage"
			><tr class="no-records">
				<td>Sin registros.</td>
			</tr></ng-template
		>
	</p-table>
</div>

<!-- Diálogo de inserción y edición -->
<p-dialog
	[(visible)]="mostrarDialogoEdicionGastoFijo"
	[breakpoints]="{ '991px': '80vw', '640px': '96vw' }"
	[style]="{ width: '50vw' }"
	[modal]="true"
	[closable]="false"
	header="Detalles del Gasto Fijo {{ GastoFijo && GastoFijo.id_gasto_fijo == 0 ? ' Nuevo' : '' }}"
	styleClass="p-fluid"
>
	<ng-template pTemplate="content">
		<form id="frmGastoFijo" class="mt-1" [formGroup]="frmGastoFijo" autocomplete="off">
			<div class="row py-1">
				<!-- Tipo de Miembro -->
				<div class="col">
					<label for="txtGastoFijo">Gasto fijo</label>
					<input
						type="text"
						pInputText
						id="txtGastoFijo"
						formControlName="gasto_fijo"
						class="uppercase"
						(focus)="hlpApp.selectAllContent($event)"
						autofocus
					/>
				</div>
			</div>
		</form>
	</ng-template>
	<ng-template pTemplate="footer">
		<!-- Botón Guardar -->
		<button
			pButton
			type="button"
			label="Guardar"
			icon="pi pi-save"
			class="p-button-raised p-button-info me-sm-1"
			pTooltip="Almacenar la información"
			tooltipPosition="top"
			[disabled]="!frmGastoFijo.valid"
			(click)="onGastoFijoGuardar()"
		></button>
		<!-- Botón Cancelar -->
		<button
			pButton
			type="button"
			label="Cancelar"
			icon="pi pi-times"
			class="p-button-raised p-button-warning ml-2"
			pTooltip="Cancelar el proceso"
			tooltipPosition="top"
			(click)="onGastoFijoCancelar()"
		></button>
	</ng-template>
</p-dialog>
