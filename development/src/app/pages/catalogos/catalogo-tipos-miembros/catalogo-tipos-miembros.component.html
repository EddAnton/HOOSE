<div class="card shadow-sm">
	<p-table
		#ptTiposMiembros
		[responsive]="true"
		[value]="TiposMiembros"
		[columns]="TiposMiembrosCols"
		[rowHover]="true"
		[globalFilterFields]="TiposMiembrosFilter"
		[showCurrentPageReport]="true"
		[paginator]="TiposMiembros.length > 0"
		[rows]="50"
		dataKey="id_usuario"
		styleClass="p-datatable-striped"
		currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} registros"
	>
		<ng-template pTemplate="caption">
			<div class="d-flex align-items-center p-1">
				<div class="me-auto">
					<!-- Botón Nuevo -->
					<button
						pButton
						type="button"
						icon="pi pi-plus"
						class="p-button-rounded p-button-raised p-button-success ms-1"
						pTooltip="Agregar tipo de miembro"
						tooltipPosition="right"
						(click)="onTipoMiembroEditar()"
					></button>
				</div>
				<!-- Opciones Filtrado -->
				<div class="ms-auto">
					<!-- Botón Actualizar -->
					<button
						*ngIf="isDevelopment"
						pButton
						type="button"
						icon="pi pi-refresh"
						class="p-button-rounded p-button-text p-button-secondary me-2"
						pTooltip="Actualizar información"
						tooltipPosition="right"
						(click)="onActualizarInformacion()"
					></button>
					<span class="p-input-icon-left">
						<i class="pi pi-search"></i>
						<input
							type="text"
							id="txtGlobalFilter"
							class="form-control ms-1 ps-4"
							(input)="ptTiposMiembros.filterGlobal($event.target.value, 'contains')"
							placeholder="Filtrar"
						/>
					</span>
				</div>
				<div>
					<button
						pButton
						pRipple
						type="button"
						id="btnLimpiarFiltro"
						icon="pi pi-times"
						class="p-button-rounded p-button-text p-button-danger ms-3"
						pTooltip="Limpiar filtro"
						tooltipPosition="left"
						(click)="hlpPrimeNGTable.reset(ptTiposMiembros)"
					></button>
				</div>
			</div>
		</ng-template>
		<ng-template pTemplate="header" let-columns>
			<tr>
				<th
					*ngFor="let col of columns"
					class="text-center"
					[ngStyle]="{
						width: col.width ? col.width : 'inherit'
					}"
				>
					{{ col.header ? col.header : '&nbsp;' }}
				</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-TipoMiembro>
			<tr>
				<td><span class="p-column-title">Tipo</span>{{ TipoMiembro.tipo_miembro }}</td>
				<td class="text-md-center">
					<span class="p-column-title">Colaborador</span>{{ TipoMiembro.es_colaborador == 1 ? 'SI' : 'NO' }}
				</td>
				<td class="text-md-center">
					<span class="p-column-title">Estatus</span>
					<span style="cursor: pointer">
						<p-tag
							severity="{{ TipoMiembro.estatus == 1 ? 'success' : 'danger' }}"
							value="{{ TipoMiembro.estatus == 1 ? 'A' : 'Ina' }}ctivo"
							pTooltip="{{ TipoMiembro.estatus == 1 ? 'Desh' : 'H' }}abilitar tipo de miembro"
							tooltipPosition="left"
							(click)="onTipoMiembroAlternarEstatus(TipoMiembro)"
						></p-tag>
					</span>
				</td>
				<td class="text-end">
					<!-- Botón Editar -->
					<button
						pButton
						*ngIf="TipoMiembro.estatus == 1"
						type="button"
						icon="pi pi-pencil"
						class="p-button-rounded p-button-text p-button-success me-1"
						pTooltip="Editar tipo de miembro"
						tooltipPosition="left"
						(click)="onTipoMiembroEditar(TipoMiembro.id_tipo_miembro)"
					></button>
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="emptymessage"
			><tr class="no-records">
				<td>Sin registros.</td>
			</tr></ng-template
		>
	</p-table>
</div>

<!-- Diálogo de inserción y edición -->
<p-dialog
	[(visible)]="mostrarDialogoEdicionTipoMiembro"
	[breakpoints]="{ '991px': '80vw', '640px': '96vw' }"
	[style]="{ width: '50vw' }"
	[modal]="true"
	[closable]="false"
	header="Detalles del Tipo de Miembro {{ TipoMiembro && TipoMiembro.id_tipo_miembro == 0 ? ' Nuevo' : '' }}"
	styleClass="p-fluid"
>
	<ng-template pTemplate="content">
		<form id="frmTipoMiembro" class="mt-1" [formGroup]="frmTipoMiembro" autocomplete="off">
			<div class="row py-1">
				<!-- Tipo de Miembro -->
				<div class="col-12 col-md-8">
					<label for="txtTipoMiembro">Tipo de miembro</label>
					<input
						type="text"
						pInputText
						id="txtTipoMiembro"
						formControlName="tipo_miembro"
						class="uppercase"
						autofocus
						(focus)="hlpApp.selectAllContent($event)"
					/>
				</div>
				<!-- Usuario -->
				<div class="col-12 col-md-4 align-self-end mt-0 mt-sm-3">
					<!-- <div class="form-check form-switch">
						<input
							class="form-check-input"
							type="checkbox"
							role="switch"
							id="chkColaborador"
							formControlName="es_colaborador"
							checked
						/>
						<label class="form-check-label" for="chkColaborador">¿Es colaborador?</label>
					</div> -->
					<label>
						<div class="d-flex align-items-center">
							<p-inputSwitch
								formControlName="es_colaborador"
								pTooltip="Indicar si el tipo de miembro es colaborador"
								tooltipPosition="top"
							></p-inputSwitch>
							<span class="ms-2"> ¿Es colaborador?</span>
						</div></label
					>
				</div>
			</div>
		</form>
	</ng-template>
	<ng-template pTemplate="footer">
		<!-- Botón Guardar -->
		<button
			pButton
			type="button"
			label="Guardar"
			icon="pi pi-save"
			class="p-button-raised p-button-info me-sm-1"
			pTooltip="Almacenar la información"
			tooltipPosition="top"
			[disabled]="!frmTipoMiembro.valid"
			(click)="onTipoMiembroGuardar()"
		></button>
		<!-- Botón Cancelar -->
		<button
			pButton
			type="button"
			label="Cancelar"
			icon="pi pi-times"
			class="p-button-raised p-button-warning ml-2"
			pTooltip="Cancelar el proceso"
			tooltipPosition="top"
			(click)="onTipoMiembroCancelar()"
		></button>
	</ng-template>
</p-dialog>
