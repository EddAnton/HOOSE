<div class="card shadow-sm">
	<p-table
		#ptEdificios
		[responsive]="true"
		[value]="Edificios"
		[columns]="EdificiosCols"
		[globalFilterFields]="EdificiosFilter"
		[rowHover]="true"
		[showCurrentPageReport]="true"
		[paginator]="Edificios.length > 0"
		[rows]="50"
		dataKey="id_edificio"
		styleClass="p-datatable-striped"
		currentPageReportTemplate="Mostrando del {first} al {last} de {totalRecords} registros"
	>
		<ng-template pTemplate="caption">
			<div class="d-flex align-items-center p-1">
				<div class="me-auto">
					<!-- Botón Nuevo -->
					<button
						pButton
						type="button"
						icon="pi pi-plus"
						class="p-button-rounded p-button-raised p-button-success ms-1"
						pTooltip="Agregar edificio"
						tooltipPosition="right"
						(click)="onEdificioEditar()"
					></button>
				</div>
				<!-- Opciones Filtrado -->
				<div class="ms-auto">
					<!-- Botón Actualizar -->
					<button
						*ngIf="isDevelopment"
						pButton
						type="button"
						icon="pi pi-refresh"
						class="p-button-rounded p-button-text p-button-secondary me-2"
						pTooltip="Actualizar información"
						tooltipPosition="right"
						(click)="onActualizarInformacion()"
					></button>
					<span class="p-input-icon-left">
						<i class="pi pi-search"></i>
						<input
							type="text"
							id="txtGlobalFilter"
							class="form-control ms-1 ps-4"
							(input)="ptEdificios.filterGlobal($event.target.value, 'contains')"
							placeholder="Filtrar"
						/>
					</span>
				</div>
				<div>
					<button
						pButton
						pRipple
						type="button"
						id="btnLimpiarFiltro"
						icon="pi pi-times"
						class="p-button-rounded p-button-text p-button-danger ms-3"
						pTooltip="Limpiar filtro"
						tooltipPosition="left"
						(click)="hlpPrimeNGTable.reset(ptEdificios)"
					></button>
				</div>
			</div>
		</ng-template>
		<ng-template pTemplate="header" let-columns>
			<tr>
				<th
					*ngFor="let col of columns"
					class="text-center"
					[ngStyle]="{
						width: col.width ? col.width : 'inherit'
					}"
				>
					{{ col.header ? col.header : '&nbsp;' }}
				</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-Edificio>
			<tr>
				<td><span class="p-column-title">Edificio</span>{{ Edificio.edificio }}</td>
				<td class="text-md-center">
					<span class="p-column-title">Estatus</span>
					<span style="cursor: pointer">
						<p-tag
							severity="{{ Edificio.estatus == 1 ? 'success' : 'danger' }}"
							value="{{ Edificio.estatus == 1 ? 'A' : 'Ina' }}ctivo"
							pTooltip="{{ Edificio.estatus == 1 ? 'Desh' : 'H' }}abilitar edificio"
							tooltipPosition="left"
							(click)="onEdificioAlternarEstatus(Edificio)"
						></p-tag>
					</span>
				</td>
				<td class="text-end">
					<!-- Botón Editar -->
					<button
						pButton
						type="button"
						icon="pi pi-pencil"
						class="p-button-rounded p-button-text p-button-success me-1"
						pTooltip="Editar edificio"
						tooltipPosition="left"
						(click)="onEdificioEditar(Edificio.id_edificio)"
					></button>
					<!-- Botón Deshabilitar -->
					<!-- <button
						pButton
						type="button"
						icon="pi pi-trash"
						class="p-button-rounded p-button-text p-button-danger me-1"
						pTooltip="Deshabilitar edificio"
						tooltipPosition="left"
						(click)="onEdificioDeshabilitar(Edificio)"
					></button> -->
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="emptymessage"
			><tr class="no-records">
				<td>Sin registros.</td>
			</tr></ng-template
		>
	</p-table>
</div>

<!-- Diálogo de inserción y edición -->
<p-dialog
	[(visible)]="mostrarDialogoEdicionEdificio"
	[breakpoints]="{ '991px': '80vw', '640px': '96vw' }"
	[style]="{ width: '50vw' }"
	[modal]="true"
	[closable]="false"
	header="Detalles del Edificio {{ Edificio && Edificio.id_edificio == 0 ? ' Nuevo' : '' }}"
	styleClass="p-fluid"
>
	<ng-template pTemplate="content">
		<form id="frmEdificio" class="mt-1" [formGroup]="frmEdificio" autocomplete="off">
			<!-- Edificio -->
			<div class="row py-1">
				<div class="col-12">
					<label for="edificio">Edificio</label>
					<input
						pInputText
						type="text"
						id="txtEdificio"
						formControlName="edificio"
						class="uppercase"
						autofocus
						(focus)="hlpApp.selectAllContent($event)"
					/>
				</div>
			</div>
		</form>
	</ng-template>
	<ng-template pTemplate="footer">
		<!-- Botón Guardar -->
		<button
			pButton
			type="button"
			label="Guardar"
			icon="pi pi-save"
			class="p-button-raised p-button-info me-sm-1"
			pTooltip="Almacenar la información"
			tooltipPosition="top"
			[disabled]="!frmEdificio.valid"
			(click)="onEdificioGuardar()"
		></button>
		<!-- Botón Cancelar -->
		<button
			pButton
			type="button"
			label="Cancelar"
			icon="pi pi-times"
			class="p-button-raised p-button-warning ml-2"
			pTooltip="Cancelar el proceso"
			tooltipPosition="top"
			(click)="onEdificioCancelar()"
		></button>
	</ng-template>
</p-dialog>
